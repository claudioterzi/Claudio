version: "3.9"

# Stack Raffaello — Synology NAS
# Avvio: docker-compose up -d
# Logs: docker-compose logs -f raffaello

services:

  redis:
    image: redis:7-alpine
    container_name: raffaello-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:latest
    container_name: raffaello-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  raffaello:
    build:
      context: .
      dockerfile: Dockerfile.raffaello
    container_name: raffaello-agent
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - SEED_PATH=/data/raffaello_seed.json
      - LOG_LEVEL=INFO
    volumes:
      - raffaello_data:/data
    ports:
      - "8765:8765"

  raffaello-loop:
    build:
      context: .
      dockerfile: Dockerfile.raffaello
    container_name: raffaello-loop
    restart: unless-stopped
    depends_on:
      - raffaello
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SEED_PATH=/data/raffaello_seed.json
      - LOOP_MINUTI=30
    volumes:
      - raffaello_data:/data
    command: ["python", "-m", "sdq1.raffaello.loop"]

volumes:
  redis_data:
  qdrant_data:
  raffaello_data:
