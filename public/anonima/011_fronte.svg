<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 384"
     width="320" height="384" role="img" aria-label="Cornice Polaroid velata 011">
  <rect width="320" height="384" fill="#fbfaf6"/>
  <rect x="0.5" y="0.5" width="319" height="383" fill="none" stroke="#e2dccb"/>
  <rect x="23" y="23" width="274" height="274" fill="#efe9dc"/>
  
  <defs>
    <linearGradient id="emul" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#b7b3a6"/>
      <stop offset="1" stop-color="#8d8a80"/>
    </linearGradient>
    <pattern id="hatch" width="8" height="8" patternTransform="rotate(45)"
             patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="url(#emul)"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#c9c1b0" stroke-width="2" opacity="0.5"/>
    </pattern>
    <radialGradient id="flash" cx="0.5" cy="0.2" r="0.8">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="26" y="26" width="268" height="268" fill="url(#hatch)"/>
  <rect x="26" y="26" width="268" height="268" fill="url(#flash)"/>
  <text x="160" y="160" text-anchor="middle"
        font-family="ui-monospace, Menlo, monospace" font-size="12"
        letter-spacing="4" fill="#ffffff" opacity="0.85">SENZA VOLTO</text>

  <text x="160" y="350" text-anchor="middle"
        font-family="'Segoe Script','Bradley Hand',cursive" font-size="16" fill="#6a5f49">
    viraggio</text>
  <text x="160" y="368" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="8" letter-spacing="3"
        fill="#b4ab99">ANONIMA · 011</text>
</svg>