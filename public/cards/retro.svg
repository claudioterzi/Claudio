  <circle cx="175" cy="300" r="66"  fill="none" stroke="#c9a84c" stroke-width="1"   opacity="0.35"/>
  <circle cx="175" cy="300" r="44"  fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.4"/>
  <circle cx="175" cy="300" r="22"  fill="none" stroke="#c9a84c" stroke-width="0.6" opacity="0.5"/>

  <!-- stella a 8 punte -->
  <path d="M175.0,190.0L196.0,249.2L252.8,222.2L225.8,279.0L285.0,300.0L225.8,321.0L252.8,377.8L196.0,350.8L175.0,410.0L154.0,350.8L97.2,377.8L124.2,321.0L65.0,300.0L124.2,279.0L97.2,222.2L154.0,249.2Z" fill="none" stroke="#c9a84c" stroke-width="1.2" opacity="0.35"/>
  <path d="M175.0,212.0L191.8,259.3L237.2,237.8L215.7,283.2L263.0,300.0L215.7,316.8L237.2,362.2L191.8,340.7L175.0,388.0L158.2,340.7L112.8,362.2L134.3,316.8L87.0,300.0L134.3,283.2L112.8,237.8L158.2,259.3Z" fill="none" stroke="#c9a84c" stroke-width="0.7" opacity="0.2"/>

