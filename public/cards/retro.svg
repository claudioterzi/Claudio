<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 600" width="350" height="600">
  <defs>
    <linearGradient id="bgR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e0e12"/>
      <stop offset="100%" stop-color="#080810"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#c9a84c" stroke-width="0.15" opacity="0.3"/>
    </pattern>
  </defs>

  <rect width="350" height="600" fill="url(#bgR)"/>
  <rect width="350" height="600" fill="url(#grid)"/>

  
    <!-- bordo esterno -->
    <rect x="12" y="12" width="326" height="576"
          rx="10" ry="10"
          fill="#141418" stroke="#c9a84c" stroke-width="1.8" opacity="0.95"/>
    <!-- linea interna -->
    <rect x="19" y="19" width="312" height="562"
          rx="7" ry="7"
          fill="none" stroke="#8a6a20" stroke-width="0.8" opacity="0.5"/>
    <!-- angoli decorativi -->
    <g stroke="#c9a84c" stroke-width="1.5" fill="none" opacity="0.8">
      <path d="M22,34 L34,34 L34,22"/>
      <path d="M328,34 L316,34 L316,22"/>
      <path d="M22,566 L34,566 L34,578"/>
      <path d="M328,566 L316,566 L316,578"/>
    </g>
    
    

  <!-- alone centrale -->
