name: SDQ-1 Daily Run

on:
  schedule:
    - cron: '0 7 * * *'   # ogni giorno alle 7:00 UTC (9:00 Italia)
  workflow_dispatch:        # avviabile manualmente da GitHub (anche da iPhone)

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Esegui SDQ-1
        env:
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p output
          DATE=$(date +%Y-%m-%d)
          python -m sdq1 "Analisi quotidiana automatica $DATE" --solo-output \
            > output/daily_${DATE}.txt 2>&1 || \
          python -m sdq1 "Analisi quotidiana automatica $DATE" --no-api --solo-output \
            > output/daily_${DATE}.txt 2>&1

      - name: Salva output nel repo
        run: |
          git config user.name  "SDQ-1"
          git config user.email "sdq1@claudio.local"
          git add output/
          git diff --staged --quiet || git commit -m "SDQ-1 daily $(date +%Y-%m-%d)"
          git push || true
