name: SDQ-1 Daily Run

on:
  schedule:
    - cron: '0 6 * * *'   # 08:00 CET (06:00 UTC) ogni giorno
  workflow_dispatch:        # avviabile manualmente da GitHub / iPhone

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install --no-cache-dir pyyaml anthropic "openai>=1.50.0" "google-genai>=1.0.0"

      - name: Installa ripgrep
        run: sudo apt-get install -y ripgrep

      # ── 1. Ciclo 7 agenti + Scacchiera Quantica
      - name: Agenti autonomi
        continue-on-error: true
        env:
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          mkdir -p output
          python -m sdq1 --agenti

      # ── 2. Snapshot completo (git + codice + agenti + scanner)
      - name: Snapshot
        continue-on-error: true
        run: python -m sdq1 --snapshot

      # ── 3. Briefing Telegram
      - name: Briefing Telegram
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_API_KEY:     ${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m sdq1 --notifica-briefing

      # ── 4. Salva tutto nel repo
      - name: Commit e push output
        run: |
          git config user.name  "SDQ-1 Autonomo"
          git config user.email "sdq1@claudio.local"
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}
          git add output/ || true
          git diff --staged --quiet || git commit -m "chore(daily): agenti + snapshot $(date +%Y-%m-%d)"
          git push || true
