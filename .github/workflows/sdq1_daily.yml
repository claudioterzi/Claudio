name: SDQ-1 Daily Run

on:
  schedule:
    - cron: '0 6 * * *'   # 08:00 CET (06:00 UTC) ogni giorno
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Configura git
        run: |
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"

      - name: Installa dipendenze
        run: |
          python3 -m pip install --quiet --no-cache-dir pyyaml anthropic "openai>=1.50.0" "google-genai>=1.0.0"
          sudo apt-get install -y ripgrep

      # ── 0a. Sync calendario Airbnb
      - name: Sync Airbnb
        continue-on-error: true
        env:
          AIRBNB_ICAL_URL: ${{ secrets.AIRBNB_ICAL_URL }}
        run: |
          mkdir -p output
          if [ -n "$AIRBNB_ICAL_URL" ]; then
            python3 -m sdq1 --sync-airbnb
          fi

      # ── 0. Controlla comandi Telegram in coda
      - name: Comandi Telegram
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p output
          python3 -m sdq1 --telegram-comandi

      # ── 1. Ciclo 7 agenti (notifica automatica se guardian non VERDE)
      - name: Agenti autonomi
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY:     ${{ secrets.GOOGLE_API_KEY }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mkdir -p output
          python3 -m sdq1 --agenti

      # ── 2. Scanner sicurezza + qualità
      - name: Scanner
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 -m sdq1 --scan

      # ── 3. Snapshot completo + push
      - name: Snapshot e push
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 -m sdq1 --snapshot --push

      # ── 4. Briefing operativo multi-AI su Telegram
      - name: Briefing Telegram
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY:     ${{ secrets.GOOGLE_API_KEY }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 -m sdq1 --briefing-operativo

      # ── 5. Salva tutti gli output (scan_report, agenti_stato, ecc.)
      - name: Commit output
        run: |
          git add output/ || true
          git diff --staged --quiet || git commit -m "chore(daily): agenti + scanner + snapshot $(date +%Y-%m-%d) [skip ci]"
          git push || true
