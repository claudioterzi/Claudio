name: SDQ-1 Daily Run

on:
  schedule:
    - cron: '0 7 * * *'   # ogni giorno alle 7:00 UTC (9:00 Italia)
  workflow_dispatch:        # avviabile manualmente da GitHub (anche da iPhone)

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install --no-cache-dir pyyaml anthropic "openai>=1.50.0" "google-genai>=1.0.0"

      - name: Esegui SDQ-1
        continue-on-error: true
        env:
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          mkdir -p output
          DATE=$(date +%Y-%m-%d)
          OUTPUT="output/daily_${DATE}.txt"

          # Tenta 1: tutti i provider
          python -m sdq1 "Analisi quotidiana automatica $DATE" --solo-output > "$OUTPUT" 2>&1
          STATUS=$?

          # Tenta 2: solo provider economici
          if [ $STATUS -ne 0 ]; then
            python -m sdq1 "Analisi quotidiana automatica $DATE" --economia --solo-output > "$OUTPUT" 2>&1
            STATUS=$?
          fi

          # Tenta 3: offline puro (stub)
          if [ $STATUS -ne 0 ]; then
            python -m sdq1 "Analisi quotidiana automatica $DATE" --no-api --solo-output > "$OUTPUT" 2>&1
          fi

          echo "--- Output SDQ-1 ---"
          cat "$OUTPUT" 2>/dev/null || echo "[nessun output]"

      - name: Salva output nel repo
        run: |
          git config user.name  "SDQ-1"
          git config user.email "sdq1@claudio.local"
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}
          git add output/ || true
          git diff --staged --quiet || git commit -m "SDQ-1 daily $(date +%Y-%m-%d)"
          git push || true
