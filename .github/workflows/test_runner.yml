name: Test Runner Minimo

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout
        run: |
          git clone --branch "${{ github.ref_name }}" \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}" .

      - name: Installa dipendenze
        run: python3 -m pip install --no-cache-dir anthropic

      - name: Test runner + Telegram
        run: |
          echo "Runner ubuntu-latest funziona!"
          python3 - <<'PYEOF'
          import os, json, urllib.request

          token = os.environ.get('TELEGRAM_BOT_TOKEN', '')
          chat_id = os.environ.get('TELEGRAM_CHAT_ID', '')
          if not token or not chat_id:
              print('[SKIP] Telegram non configurato')
              exit(0)

          testo = (
              "✅ <b>SDQ-1 — Runner ubuntu-latest OK</b>\n\n"
              "VPN disattivata → GitHub Actions funziona!\n\n"
              "<b>🔧 Fix code-review applicati:</b>\n"
              "  • <code>_ical_dt_to_iso</code> — datetime Airbnb senza Z ora gestito\n"
              "  • <code>--watchdog</code> — NameError su health/router corretto\n"
              "  • <code>--sync-airbnb</code> / <code>--chat-telegram</code> — startup più veloce\n"
              "  • Dead code rimosso da briefing_operativo\n"
              "  • Import inutile rimosso da _risposta_claude\n"
          )

          url = f'https://api.telegram.org/bot{token}/sendMessage'
          payload = json.dumps({'chat_id': chat_id, 'text': testo, 'parse_mode': 'HTML'}).encode()
          req = urllib.request.Request(url, data=payload, headers={'Content-Type': 'application/json'}, method='POST')
          with urllib.request.urlopen(req, timeout=10) as r:
              result = json.loads(r.read())
              print(f"Telegram: {'OK' if result.get('ok') else 'ERRORE'}")
          PYEOF
