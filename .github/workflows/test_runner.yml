name: Test Runner

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - 'requirements*.txt'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install anthropic "openai>=1.50.0" "google-genai>=1.0.0" pyyaml flask mistralai

      - name: Verifica import principali
        run: |
          python -c "from tarocchi import MAZZO, cerca_carta; print(f'Mazzo OK: {len(MAZZO)} carte')"
          python -c "from sdq1.notifiche import invia; print('notifiche OK')"
          python -c "from sdq1.llm.providers import AnthropicProvider; print('providers OK')"

      - name: Verifica Flask app
        run: |
          python -c "import tarocchi_web; print('Flask app OK')"

      - name: Test mazzo completo
        run: |
          python -c "
          from tarocchi import MAZZO, cerca_carta
          assert len(MAZZO) == 78, f'Attese 78 carte, trovate {len(MAZZO)}'
          carta = cerca_carta('il matto')
          assert carta is not None, 'Il Matto non trovato'
          print('Test mazzo: OK')
          "
