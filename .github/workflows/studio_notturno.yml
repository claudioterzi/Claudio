name: SDQ-1 Studio Notturno

on:
  schedule:
    - cron: '0 0 * * *'   # 00:00 UTC = 02:00 AM Brussels (UTC+2 estate)
  workflow_dispatch:

jobs:
  studia:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Configura git
        run: |
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"

      - name: Installa dipendenze
        run: python3 -m pip install --quiet --no-cache-dir anthropic

      - name: Studio Notturno
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY non configurata — studio saltato. Aggiungerla in Settings → Secrets and variables → Actions per attivare lo Studio Notturno."
            exit 0
          fi
          python3 scripts/studio_notturno.py

      - name: Salva Morning Brief nel repo
        run: |
          git add output/morning_brief/
          git diff --staged --quiet || git commit -m "morning brief $(date +%Y-%m-%d) [skip ci]"
          git push || true
