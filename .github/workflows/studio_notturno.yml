name: Studio Notturno SDQ-1

on:
  schedule:
    - cron: '0 0 * * *'   # 00:00 UTC = 2:00 Brussels CEST
  workflow_dispatch:

jobs:
  studio:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install --no-cache-dir anthropic "google-genai>=1.0.0" google-api-python-client google-auth

      - name: Esegui studio notturno + analisi portfolio
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
        run: python scripts/studio_notturno.py

      - name: Sync su Google Drive
        if: ${{ secrets.GOOGLE_CREDENTIALS_JSON != '' }}
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          AGORA_FOLDER_ID:         ${{ secrets.AGORA_FOLDER_ID }}
          DRIVE_BRIEF_FOLDER_ID:   ${{ secrets.DRIVE_BRIEF_FOLDER_ID }}
          DRIVE_PORTFOLIO_FOLDER_ID: ${{ secrets.DRIVE_PORTFOLIO_FOLDER_ID }}
          DRIVE_PERSONALE_FOLDER_ID: ${{ secrets.DRIVE_PERSONALE_FOLDER_ID }}
          DRIVE_FABRIZIO_FOLDER_ID:  ${{ secrets.DRIVE_FABRIZIO_FOLDER_ID }}
        run: python scripts/sync_to_drive.py || echo "[sync] Drive sync fallita, continuo senza"

      - name: Commit e push brief
        run: |
          git config user.name  "SDQ-1 Studio Notturno"
          git config user.email "sdq1@claudio.local"
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}
          git add output/morning_brief/ output/portfolio/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "[studio_notturno] Nessun output da salvare"
            exit 0
          fi
          git commit -m "studio_notturno: brief + portfolio $(date +%Y-%m-%d)"
          for attempt in 1 2 3; do
            git push && break
            echo "[studio_notturno] Push fallito (tentativo $attempt/3)"
            sleep $((attempt * 4))
            git pull --rebase origin main || true
          done
