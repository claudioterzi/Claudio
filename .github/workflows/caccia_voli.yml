name: SDQ-1 Caccia Voli

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC = 09:00 Brussels — controllo mattutino error fare
  workflow_dispatch:        # esecuzione manuale on-demand ("mandami i voli di oggi")

jobs:
  caccia:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installa Playwright + Chromium
        working-directory: sdq1/voli
        run: |
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Caccia voli e invia note su Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m sdq1.voli
