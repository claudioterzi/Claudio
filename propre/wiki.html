<style>

  .cat-title {

    color: var(--gold-dim); margin: .9rem 0 .4rem;
  }
  .card-link {
    display: block; padding: .4rem .5rem; border-radius: 4px; cursor: pointer;
    color: var(--text); text-decoration: none; font-size: .88rem;
  }
  .card-link:hover, .card-link.active { background: var(--surface); color: var(--gold); }
  main { flex: 1; padding: 2.5rem 3rem; max-width: 780px; overflow-y: auto; }
  .placeholder { color: var(--text-dim); margin-top: 4rem; text-align: center; }
  .badge {
    display: inline-block; font-size: .68rem; letter-spacing: .08em; text-transform: uppercase;
    padding: .2rem .5rem; border-radius: 3px; border: 1px solid var(--border); color: var(--text-dim);
  }
  .badge.bozza { color: var(--gold-dim); border-color: var(--gold-dim); }
  .badge.verificata { color: #6f9c5c; border-color: #6f9c5c; }
  article h2 { color: var(--gold); font-size: 1.8rem; font-weight: normal; margin-bottom: .2rem; }
  article .sinonimi { color: var(--text-dim); font-size: .85rem; margin-bottom: 1rem; }
  article .meta { display: flex; gap: .6rem; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
  section.block { margin-bottom: 1.6rem; }
  section.block h3 {
    font-size: .72rem; letter-spacing: .14em; text-transform: uppercase;
    color: var(--gold-dim); margin-bottom: .5rem; border-bottom: 1px solid var(--border); padding-bottom: .3rem;
  }

  section.block ul { padding-left: 1.2rem; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  .incompat-item {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: .7rem .9rem; margin-bottom: .5rem; font-size: .9rem;
  }
  .incompat-item.pericolo { border-color: var(--danger); background: var(--danger-bg); }
  .incompat-item .con { color: var(--gold); font-weight: bold; }
  .incompat-item .flag { color: var(--danger); font-size: .75rem; letter-spacing: .08em; text-transform: uppercase; display: block; margin-top: .3rem; }
  .sicurezza-grid { display: grid; grid-template-columns: 1fr; gap: .8rem; }
  .sicurezza-grid .k { color: var(--gold-dim); font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; }
  .collegamenti { display: flex; gap: .4rem; flex-wrap: wrap; }
  .collegamenti a {
    font-size: .78rem; color: var(--gold-dim); border: 1px solid var(--border);
    padding: .2rem .5rem; border-radius: 3px; text-decoration: none;
  }
  .collegamenti a:hover { color: var(--gold); border-color: var(--gold-dim); }
  .load-note { color: var(--text-dim); font-size: .8rem; margin-top: 3rem; text-align: center; }
</style>
</head>

o in formazione."}}, {"id": "bicarbonato_di_sodio", "nome": "Bicarbonato di Sodio", "sinonimi": ["Sodium Bicarbonate (INCI)", "E500ii", "idrogenocarbonato di sodio", "baking soda"], "categoria": "sale_tampone", "formula_chimica": "NaHCO₃", "ph_tipico": "~8,3 (soluzione al 1%) — alcalinità debole e tamponata", "origine": "Minerale (nahcolite, trona) o prodotto industrialmente con il processo Solvay. Polvere cristallina bianca, inodore.", "come_funziona": "Sale anfotero: tampona il pH intorno a 8-8,5, reagendo sia con gli acidi (liberando CO₂) sia, debolmente, con le basi. Tre azioni utili: (1) tampone — mantiene stabile il pH di una soluzione di lavaggio; (2) deodorante — neutralizza chimicamente gli odori acidi (sudore, rancido) e adsorbe le molecole odorose sulla superficie dei cristalli; (3) abrasivo dolcissimo — durezza Mohs ~2,5, inferiore a quasi tutte le superfici, quindi pulisce meccanicamente senza graffiare.", "dove_si_usa": ["Deodorizzazione a secco di tappeti e moquette: cospargere, lasciare agire, aspirare a fondo", "Tamponamento del pH nelle soluzioni di lavaggio", "Pulizia delicata di superfici con leggera azione meccanica", "Neutralizzazione rapida di sversamenti acidi", "Pretrattamento di odori organici (animali, umidità) prima del lavaggio"], "dove_non_si_usa": ["Su lana e seta in soluzioni concentrate o ripetute: l'alcalinità, pur debole, danneggia le fibre proteiche nel tempo", "Su alluminio (lo scurisce)", "Insieme ad acidi quando si vuole conservare l'azione di entrambi", "Come detergente principale: il potere pulente proprio è modesto"], "compatibilita": ["tensioattivi anionici e non ionici", "fibre cellulosiche: cotone, lino (le tollerano bene)", "percarbonato di sodio (spesso formulati insieme)", "enzimi (il pH 8-8,5 è nell'intervallo di lavoro di proteasi e lipasi)"], "incompatibilita": [{"con": "acidi (acido_citrico, acido_acetico)", "effetto": "effervescenza con sviluppo di CO₂: innocua, ma neutralizza entrambi i prodotti", "pericolo": false}, {"con": "contenitori chiusi ermeticamente con acidi o umidità", "effetto": "la CO₂ sviluppata può mettere in pressione il contenitore", "pericolo": true}, {"con": "alluminio", "effetto": "scurimento e corrosione superficiale del metallo", "pericolo": false}], "vantaggi": ["Sicurezza pressoché totale: alimentare, non irritante, nessun DPI particolare", "Costo bassissimo", "Deodorante vero (neutralizza, non copre)", "Stabile indefinitamente se tenuto asciutto", "Ecologico"], "svantaggi": ["Potere detergente proprio molto limitato", "Lascia residui polverosi bianchi se non aspirato o risciacquato a fondo", "Poco solubile a freddo (~9 g/100 ml a 20 °C): facile superare la saturazione", "Sopra i 50 °C si decompone in carbonato (più alcalino): il pH della soluzione calda sale"], "tossicita": "Molto bassa: è un additivo alimentare. La polvere può irritare lievemente occhi e vie respiratorie in grandi quantità. Nessun rischio pratico alle dosi d'uso.", "sicurezza": {"dpi": ["nessuno richiesto per l'uso normale; occhiali se si movimentano grandi quantità di polvere"], "manipolazione": "Evitare di sollevare nuvole di polvere. Non chiudere ermeticamente miscele umide con acidi.", "stoccaggio": "Luogo asciutto: con l'umidità impacca. Nessuna precauzione speciale.", "primo_soccorso": "Occhi: risciacquare con acqua. Inalazione abbondante di polvere: aria fresca."}, "costo": "Bassissimo: indicativamente 0,7-1,5 €/kg grado tecnico in sacchi (riferimento 2026).", "alternative": [{"sostanza": "carbonato di sodio (soda Solvay)", "quando_preferirla": "quando serve più alcalinità e potere sgrassante (pH ~11), su fibre che la tollerano"}, {"sostanza": "percarbonato di sodio", "quando_preferirla": "quando oltre all'alcalinità serve azione sbiancante ossidante (rilascia perossido_di_idrogeno)"}, {"sostanza": "sesquicarbonato di sodio", "quando_preferirla": "via di mezzo tra bicarbonato e carbonato, usato nel lavaggio dei tessili delicati alcalino-tolleranti"}], "collegamenti": ["acido_citrico", "acido_acetico", "perossido_di_idrogeno", "volume_1:basi", "volume_1:ph", "volume_4:odori"], "verifica": {"stato": "bozza", "data": "2026-07-07", "note": "Scheda pilota. Da revisionare da un tecnico prima dell'uso in formazione."}}, {"id": "isopropanolo", "nome": "Isopropanolo", "sinonimi": ["Isopropyl Alcohol (INCI)", "alcol isopropilico", "IPA", "2-propanolo", "propan-2-olo"], "categoria": "solvente", "formula_chimica": "C₃H₈O (CH₃)₂CHOH", "ph_tipico": "neutro (~7, non è né acido né base in acqua)", "origine": "Sintesi industriale per idratazione del propilene. Liquido incolore, odore alcolico pungente, completamente miscibile con acqua. Gradi comuni: 70% (disinfezione), 99,9% (tecnico/elettronica).", "come_funziona": "Solvente polare-protico 'di mezzo': abbastanza polare da sciogliersi in acqua, abbastanza apolare da sciogliere oli leggeri, resine, inchiostri e adesivi. Rompe le membrane lipidiche (da cui l'azione disinfettante, massima al 70% dove l'acqua ne rallenta l'evaporazione e ne aumenta la penetrazione). Evapora rapidamente e completamente: pulisce senza risciacquo e accelera l'asciugatura delle zone trattate. Sui tessili è il solvente da smacchiatura 'ponte' tra le macchie a base acquosa e quelle a base solvente.", "dove_si_usa": ["Smacchiatura di inchiostri, penna a sfera, pennarelli (tamponare, mai strofinare)", "Rimozione di residui di adesivi, etichette, resine leggere", "Sgrassaggio rapido di superfici che devono asciugare subito", "Disinfezione di superfici e strumenti (grado 70%)", "Accelerante di asciugatura su piccole zone trattate a umido", "Solvente vettore in formulazioni smacchianti"], "dove_non_si_usa": ["Su acetato e triacetato: scioglie la fibra (buchi irreversibili)", "Su superfici verniciate, laccate o plastiche sensibili (plexiglass: crea microfratture)", "Su coloranti non testati: alcuni inchiostri e tinture migrano formando aloni più grandi della macchia", "Vicino a fiamme, scintille o superfici calde (infiammabile)", "Su gomma e alcune guarnizioni a contatto prolungato"], "compatibilita": ["acqua (miscibile in ogni proporzione: si formulano gradazioni su misura)", "etanolo e altri alcoli", "tensioattivi (co-solvente comune nelle formule sgrassanti)", "ammoniaca (formulazioni per vetri)", "fibre: cotone, lino, poliestere, poliammide (con test preventivo sui colori)"], "incompatibilita": [{"con": "fiamme libere, scintille, cariche elettrostatiche", "effetto": "infiammabile (flash point ~12 °C): i vapori formano miscele esplosive con l'aria", "pericolo": true}, {"con": "ossidanti forti (perossido_di_idrogeno concentrato, ipoclorito, acidi ossidanti)", "effetto": "reazione esotermica, possibile innesco d'incendio", "pericolo": true}, {"con": "fibre di acetato e triacetato", "effetto": "dissoluzione della fibra: danno irreversibile", "pericolo": false}, {"con": "lanolina e trattamenti nutrienti/impermeabilizzanti", "effetto": "li asporta: dopo l'uso va ripristinato il trattamento", "pericolo": false}], "vantaggi": ["Evapora completamente: zero residui, zero risciacquo", "Versatile: smacchiatura, sgrassaggio, disinfezione, asciugatura", "Miscibile con acqua: gradazione regolabile sulla macchia", "Economico e reperibile", "Meno tossico del metanolo e meno regolamentato dell'etanolo denaturato in molti contesti"], "svantaggi": ["Infiammabile: impone regole vere di stoccaggio e uso", "Vapori narcotici in ambienti chiusi (mal di testa, vertigini)", "Sgrassa anche la pelle delle mani (dermatiti da uso frequente senza guanti)", "Su alcune macchie fissa invece di sciogliere se usato puro senza test"], "tossicita": "Moderata. Inalazione: i vapori irritano le mucose e ad alte concentrazioni danno effetti narcotici (vertigini, sonnolenza). Ingestione: tossico (più dell'etanolo, meno del metanolo) — da escludere assolutamente. Contatto: secca e irrita la pelle con l'uso ripetuto. Non classificato cancerogeno.", "sicurezza": {"dpi": ["guanti in nitrile (il lattice non protegge dai solventi)", "occhiali di protezione", "ventilazione; filtro per vapori organici (tipo A) per usi prolungati"], "manipolazione": "Lontano da ogni fonte di innesco. Travasare lentamente per evitare cariche elettrostatiche. Richiudere subito i contenitori. Tamponare le macchie dall'esterno verso il centro.", "stoccaggio": "Armadio per infiammabili o luogo fresco e ventilato, lontano da ossidanti e fonti di calore. Contenitori metallici o HDPE ben chiusi.", "primo_soccorso": "Inalazione: aria fresca. Occhi: risciacquo 15 minuti. Pelle: lavare e idratare. Ingestione: NON indurre vomito, consulto medico immediato."}, "costo": "Basso-medio: indicativamente 2-4 €/L per il grado tecnico 99,9% in taniche (riferimento 2026).", "alternative": [{"sostanza": "etanolo", "quando_preferirla": "profilo tossicologico ancora migliore; costa di più per via delle accise se non denaturato"}, {"sostanza": "acetone", "quando_preferirla": "resine e smalti che l'IPA non scioglie; MAI su acetato, ancora più aggressivo"}, {"sostanza": "solventi glicolici (butilglicole, propilenglicole)", "quando_preferirla": "evaporazione lenta e potere sgrassante maggiore nelle formule professionali; richiedono risciacquo"}], "collegamenti": ["ammoniaca", "lanolina", "perossido_di_idrogeno", "volume_1:solventi", "volume_3:acetato", "volume_4:inchiostro", "volume_4:adesivi"], "verifica": {"stato": "bozza", "data": "2026-07-07", "note": "Scheda pilota. Da revisionare da un tecnico prima dell'uso in formazione."}}, {"id": "lanolina", "nome": "Lanolina", "sinonimi": ["Lanolin (INCI)", "grasso di lana", "cera di lana", "adeps lanae"], "categoria": "grasso_cera", "formula_chimica": "Miscela naturale complessa di esteri di acidi grassi con alcoli lanolinici e steroli (non ha formula unica)", "ph_tipico": "non applicabile (sostanza grassa, non acquosa)", "origine": "Sottoprodotto del lavaggio della lana grezza: la secrezione sebacea della pecora che protegge il vello. Raffinata per centrifugazione e purificazione. Cera giallastra, morbida, dall'odore caratteristico tenue.", "come_funziona": "È il condizionante naturale della lana: chimicamente affine alla cheratina, si distribuisce sulla superficie della fibra ripristinando il film lipidico che i lavaggi (soprattutto alcalini o con solventi) asportano. Effetti: la fibra ritrova morbidezza, elasticità e una moderata idrorepellenza; le squame superficiali scorrono invece di agganciarsi (meno infeltrimento); i colori riprendono profondità ottica. È anche un emolliente potentissimo: assorbe fino a due volte il suo peso in acqua formando emulsioni A/O.", "dove_si_usa": ["Ritrattamento nutriente di tappeti e capi in lana dopo lavaggi aggressivi (emulsione diluita nel risciacquo finale o nebulizzata)", "Ripristino della mano su lane infeltrite o 'secche'", "Manutenzione di pellami e cuoio (nutriente classico)", "Protezione di lane pregiate (cashmere, mohair) in cicli di lavaggio frequenti", "Impermeabilizzazione naturale leggera (indumenti tecnici in lana, copripannolini)"], "dove_non_si_usa": ["Su fibre sintetiche: unge senza alcun beneficio strutturale", "Su tessuti che devono restare assorbenti (spugne, strofinacci)", "Su tessuti chiari in eccesso: può ingiallire nel tempo e trattenere sporco", "Su persone/oggetti con allergia nota alla lanolina"], "compatibilita": ["fibre proteiche: lana (affinità naturale), seta", "tensioattivi non ionici (servono per emulsionarla in acqua)", "oli e cere naturali (miscibile)", "acido_citrico e acido_acetico nel bagno di risciacquo (pH acido = fibra proteica felice)"], "incompatibilita": [{"con": "solventi forti (isopropanolo concentrato, acetone, percloroetilene)", "effetto": "la sciolgono e la asportano: un lavaggio a secco successivo annulla il trattamento", "pericolo": false}, {"con": "alcali forti (soda, ammoniaca)", "effetto": "saponificazione parziale: la lanolina si degrada e perde le proprietà protettive", "pericolo": false}, {"con": "ossidanti (perossido_di_idrogeno, ipoclorito)", "effetto": "irrancidiment epellenza su sintetici e miste; film non naturale"}, {"sostanza": "olio di jojoba emulsionato", "quando_preferirla": "alternativa vegetale per chi è allergico alla lanolina; più stabile all'irrancidimento"}], "collegamenti": ["isopropanolo", "acido_acetico", "volume_3:lana", "volume_3:seta", "volume_7:conservazione", "volume_1:tensioattivi"], "verifica": {"stato": "bozza", "data": "2026-07-07", "note": "Scheda pilota. Da revisionare da un tecnico prima dell'uso in formazione."}}, {"id": "perossido_di_idrogeno", "nome": "Perossido di Idrogeno", "sinonimi": ["Hydrogen Peroxide (INCI)", "acqua ossigenata", "H₂O₂"], "categoria": "ossidante", "formula_chimica": "H₂O₂", "ph_tipico": "~4-5 (le soluzioni commerciali sono stabilizzate in ambiente leggermente acido)", "origine": "Sintesi industriale (processo all'antrachinone). Gradi comuni: 3% (10 volumi, farmaceutico), 12% (40 vol., cosmetico), 35% (130 vol., tecnico — da maneggiare con serietà).", "come_funziona": "Ossidante che si decompone in acqua e ossigeno: 2 H₂O₂ → 2 H₂O + O₂. L'ossigeno attivo spezza i doppi coniugati dei cromofori — i gruppi chimici che danno colore alle macchie — rendendole incolori. È una sbianca 'a freddo' e progressiva: non rimuove la sostanza, ne distrugge il colore. L'azione cresce con pH alcalino e temperatura, ma insieme cresce anche l'aggressività sulla fibra: l'arte sta nel bilanciare.", "dove_si_usa": ["Sbianca ossidante 'sicura per i colori' a basse concentrazioni (test preventivo sempre)", "Macchie organiche colorate: vino, caffè, tè, frutta, sangue secco", "Correzione del browning cellulosico su tappeti e tessuti (spesso con successivo risciacquo acido)", "Ingiallimenti da invecchiamento su cotone e lino", "Sanificazione: è biocida ad ampio spettro e non lascia residui"], "dove_non_si_usa": ["Su lana e seta ad alte concentrazioni o a caldo (degrada le fibre proteiche)", "Su capi con parti metalliche o residui di ferro/rame: i metalli catalizzano la decomposizione (reazione di Fenton) const nav = document.getElementById('nav');
const main = document.getElementById('main');
const search = document.getElementById('search');

function renderNav(filtro) {
  const f = (filtro || '').toLowerCase();
  const perCategoria = {};
  SCHEDE.filter(s => !f || s.nome.toLowerCase().includes(f) || (s.sinonimi||[]).some(x=>x.toLowerCase().includes(f)))
        .forEach(s => { (perCategoria[s.categoria] ||= []).push(s); });
  nav.innerHTML = '';
  Object.keys(perCategoria).sort().forEach(cat => {
    const g = document.createElement('div'); g.className = 'cat-group';
    const t = document.createElement('div'); t.className = 'cat-title'; t.textContent = cat.replace(/_/g,' ');
    g.appendChild(t);
    perCategoria[cat].forEach(s => {
      const a = document.createElement('a');
      a.className = 'card-link'; a.textContent = s.nome; a.dataset.id = s.id;
      a.onclick = () => selectCard(s.id);
      g.appendChild(a);
    });
    nav.appendChild(g);
  });
}

function selectCard(id) {
  document.querySelectorAll('.card-link').forEach(el => el.classList.toggle('active', el.dataset.id === id));
  const s = SCHEDE.find(x => x.id === id);
  if (!s) return;
  main.innerHTML = renderCard(s);
  main.scrollTop = 0;
}

function esc(str) { return (str||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function list(items) { return '<ul>' + (items||[]).map(i => `<li>${esc(i)}</li>`).join('') + '</ul>'; }

function renderCard(s) {
  const incompat = (s.incompatibilita||[]).map(i => `
    <div class="incompat-item ${i.pericolo ? 'pericolo' : ''}">
      <span class="con">${esc(i.con)}</span> — ${esc(i.effetto)}
      ${i.pericolo ? '<span class="flag">⚠ pericolo per la persona</span>' : ''}
    </div>`).join('');

  const alternative = (s.alternative||[]).map(a => `<li><strong>${esc(a.sostanza)}</strong> — ${esc(a.quando_preferirla)}</li>`).join('');

  const collegamenti = (s.collegamenti||[]).map(id => {
    const target = SCHEDE.find(x => x.id === id);
    return target ? `<a onclick="selectCard('${id}')">${esc(target.nome)}</a>` : `<a style="opacity:.5">${esc(id)}</a>`;
  }).join('');

  return `
    <article>
      <div class="meta">
        <span class="badge ${esc(s.verifica?.stato)}">${esc(s.verifica?.stato)}</span>
        <span class="badge">${esc(s.categoria.replace(/_/g,' '))}</span>
        ${s.ph_tipico ? `<span class="badge">pH ${esc(s.ph_tipico)}</span>` : ''}
      </div>
      <h2>${esc(s.nome)}</h2>
      <div class="sinonimi">${(s.sinonimi||[]).join(' · ')}</div>

      <section class="block"><h3>Formula &amp; origine</h3>
        <p><strong>${esc(s.formula_chimica)}</strong></p>
        <p>${esc(s.origine)}</p>
      </section>

      <section class="block"><h3>Come funziona</h3><p>${esc(s.come_funziona)}</p></section>

      <div class="grid2">
        <section class="block"><h3>Dove si usa</h3>${list(s.dove_si_usa)}</section>
        <section class="block"><h3>Dove NON si usa</h3>${list(s.dove_non_si_usa)}</section>
      </div>

      <div class="grid2">
        <section class="block"><h3>Vantaggi</h3>${list(s.vantaggi)}</section>
        <section class="block"><h3>Svantaggi</h3>${list(s.svantaggi)}</section>
      </div>

      <section class="block"><h3>Incompatibilità</h3>${incompat || '<p>Nessuna registrata.</p>'}</section>

      <section class="block"><h3>Tossicità</h3><p>${esc(s.tossicita)}</p></section>

      <section class="block"><h3>Sicurezza</h3>
        <div class="sicurezza-grid">
          <div><span class="k">DPI</span>${list(s.sicurezza?.dpi)}</div>
          <div><span class="k">Manipolazione</span><p>${esc(s.sicurezza?.manipolazione)}</p></div>
          <div><span class="k">Stoccaggio</span><p>${esc(s.sicurezza?.stoccaggio)}</p></div>
          <div><span class="k">Primo soccorso</span><p>${esc(s.sicurezza?.primo_soccorso)}</p></div>
        </div>
      </section>

      <section class="block"><h3>Costo</h3><p>${esc(s.costo)}</p></section>

      <section class="block"><h3>Alternative</h3><ul>${alternative}</ul></section>

      ${collegamenti ? `<section class="block"><h3>Collegamenti</h3><div class="collegamenti">${collegamenti}</div></section>` : ''}
    </article>
    <p class="load-note">Scheda ${esc(s.verifica?.stato)} — ${esc(s.verifica?.note || '')}</p>
  `;
}

search.addEventListener('input', e => renderNav(e.target.value));
renderNav('');
</script>
</body>
</html>
